<!DOCTYPE html>

<head>

    <style>
        .student-item {
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            margin: 0 4px 4px 4px;
            border-radius: 10px;
        }

        .student-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 4px;
            background: #2563eb;
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .student-item.active {
            background-color: #eff6ff !important;
            border-color: #bfdbfe;
        }

        .student-item.active::before {
            opacity: 1;
            top: 0;
            bottom: 0;
            border-radius: 4px 0 0 4px;
        }

        .student-badge {
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            min-width: 48px;
            text-align: center;
        }

        .student-item.active .student-badge {
            background-color: white !important;
            color: #2563eb !important;
            border-color: #dbeafe;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.1);
        }

        .student-item .last-lesson-label {
            transition: color 0.2s;
        }

        .student-item.active .last-lesson-label {
            color: #1e40af;
        }

        .editor-box {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            min-height: 200px;
        }

        [contenteditable]:empty:before,
        [contenteditable]:focus:empty:before,
        [contenteditable][data-is-empty="true"]:before {
            content: attr(data-placeholder);
            color: #94a3b8;
            opacity: 0.5;
            pointer-events: none;
            display: block;
        }

        ::placeholder {
            color: #94a3b8;
            opacity: 0.5;
        }

        #feedback-editor b,
        #feedback-editor strong {
            font-weight: 800;
            color: #0f172a;
        }

        /* Format Buttons Toggle State */
        .format-btn {
            background-color: white;
            color: #475569;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .format-btn:hover {
            background-color: #f8fafc;
        }

        .format-btn.active {
            background-color: #2563eb !important;
            color: white !important;
            border-color: #2563eb !important;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check authentication
            const user = Auth.checkAuth('teacher');
            if (!user) return;

            const feedbackEditor = document.getElementById('feedback-editor');
            const wordCountDisplay = document.getElementById('word-count');
            const activeName = document.getElementById('active-name');
            const activeAvatar = document.getElementById('active-avatar');
            const activeGroup = document.getElementById('active-group');
            const targetLessonSelect = document.getElementById('target-lesson-select');
            const studentsList = document.getElementById('students-list');
            const boldBtn = document.getElementById('bold-btn');
            const italicBtn = document.getElementById('italic-btn');
            const underlineBtn = document.getElementById('underline-btn');
            const saveNotesBtn = document.getElementById('save-notes-btn');
            const saveStatus = document.getElementById('save-status');
            const saveStatusIndicator = document.getElementById('save-status-indicator');
            const saveStatusText = document.getElementById('save-status-text');
            const editorArea = document.getElementById('editor-area');
            const editorPlaceholder = document.getElementById('editor-placeholder');
            const groupDropdown = document.getElementById('group-dropdown');
            const groupFilterBtn = document.getElementById('group-filter-btn');
            const currentGroupLabel = document.getElementById('current-group-label');
            const studentSearchInput = document.getElementById('student-search-input');
            const lastSavedTime = document.getElementById('last-saved-time');
            const activeGroupContainer = document.getElementById('active-group-container');

            let currentFilter = 'all';
            let currentSearch = '';

            // Initialize Group dropdown
            function initFilters() {
                const filteredGroups = Auth.filterData(NOTION_GROUPS, 'groups');
                let dropdownHtml = `<button class="w-full text-left px-4 py-2.5 text-xs font-extrabold text-[#0f172a] hover:bg-slate-50 border-b border-slate-100 group-filter-option" data-group="all">All Groups</button>`;
                filteredGroups.forEach(group => {
                    dropdownHtml += `<button class="w-full text-left px-4 py-2.5 text-xs font-bold text-slate-600 hover:bg-slate-50 border-b border-slate-100 group-filter-option" data-group="${group.id}">Group ${group.id}</button>`;
                });
                groupDropdown.innerHTML = dropdownHtml;

                document.querySelectorAll('.group-filter-option').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentFilter = btn.dataset.group;
                        currentGroupLabel.textContent = btn.textContent;
                        groupDropdown.classList.add('hidden');
                        renderStudents();
                    });
                });
            }

            groupFilterBtn.addEventListener('click', () => groupDropdown.classList.toggle('hidden'));

            studentSearchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderStudents();
            });

            function getRelativeDate(isoDate) {
                if (!isoDate) return "No sessions yet";
                const d = new Date(isoDate);
                const now = new Date();

                const isToday = d.toDateString() === now.toDateString();
                const yesterday = new Date(now);
                yesterday.setDate(now.getDate() - 1);
                const isYesterday = d.toDateString() === yesterday.toDateString();

                if (isToday) {
                    return `Today, ${d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
                }
                if (isYesterday) return "Yesterday";

                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            function renderStudents() {
                const now = new Date();
                const studentsWithMetadata = [];
                const filteredGroups = Auth.filterData(NOTION_GROUPS, 'groups');
                const filteredLessons = Auth.filterData(NOTION_LESSONS);

                filteredGroups.forEach(group => {
                    group.students.forEach(student => {
                        if (currentFilter !== 'all' && group.id !== currentFilter) return;
                        if (currentSearch && !student.name.toLowerCase().includes(currentSearch)) return;

                        // Find last lesson for this student
                        const lastLesson = filteredLessons
                            .filter(l => l.students.some(s => s.id === student.id) && new Date(l.isoDate) < now)
                            .sort((a, b) => new Date(b.isoDate) - new Date(a.isoDate))[0];

                        studentsWithMetadata.push({
                            ...student,
                            groupId: group.id,
                            groupName: group.name,
                            lastLessonDate: lastLesson ? lastLesson.isoDate : null
                        });
                    });
                });

                // Deduplicate and render
                const uniqueStudents = Array.from(new Map(studentsWithMetadata.map(s => [s.id, s])).values());

                if (uniqueStudents.length === 0) {
                    studentsList.innerHTML = `
                        <div class="p-8 text-center">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">No students found</p>
                        </div>
                    `;
                    return;
                }

                studentsList.innerHTML = uniqueStudents.map(student => {
                    const relativeDate = getRelativeDate(student.lastLessonDate);
                    return `
                        <div class="student-item p-3 flex items-center justify-between cursor-pointer hover:bg-slate-50" data-student-id="${student.id}">
                            <div class="flex items-center gap-3">
                                <img src="${student.avatar}" class="w-10 h-10 rounded-full border border-white shadow-sm">
                                <div>
                                    <h4 class="font-extrabold text-[#0f172a] text-sm tracking-tight">${student.name}</h4>
                                    <p class="last-lesson-label text-[10px] font-medium text-slate-500 mt-0.5">Last lesson: ${relativeDate}</p>
                                </div>
                            </div>
                            <span class="student-badge bg-slate-50 text-slate-400 text-[10px] font-bold px-2 py-0.5 rounded-lg border shadow-sm">${student.groupId}</span>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.student-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const studentId = item.dataset.studentId;
                        const student = uniqueStudents.find(s => s.id === studentId);
                        openStudentEditor(student, item);
                    });
                });
            }

            function openStudentEditor(student, item) {
                // UI updates
                document.querySelectorAll('.student-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                editorPlaceholder.classList.add('hidden');
                editorArea.classList.remove('hidden');

                activeName.textContent = student.name;
                activeAvatar.src = student.avatar;
                activeGroup.textContent = `Group ${student.groupId}`;

                // Highlight group in blue
                activeGroupContainer.classList.remove('text-slate-400');
                activeGroupContainer.classList.add('text-[#2563eb]');

                // Reset last saved time for new student
                lastSavedTime.textContent = '--:--';

                // Populate lessons for the student
                const now = new Date();
                const filteredLessons = Auth.filterData(NOTION_LESSONS);
                const studentLessons = filteredLessons.filter(l =>
                    l.students.some(s => s.id === student.id) &&
                    new Date(l.isoDate) < now
                ).sort((a, b) => new Date(b.isoDate) - new Date(a.isoDate));

                targetLessonSelect.innerHTML = studentLessons.map(l => {
                    const date = new Date(l.isoDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    return `<option value="${l.pageId}">${l.id} - ${l.title} (${date})</option>`;
                }).join('') || '<option value="">No completed sessions</option>';

                feedbackEditor.setAttribute('data-placeholder', `Write constructive feedback for ${student.name.split(' ')[0]}...`);

                // Retrieve stored feedback object
                const storedData = localStorage.getItem(`feedback-${student.id}-${targetLessonSelect.value}`);
                let content = '';
                let timestamp = '--:--';

                if (storedData) {
                    try {
                        const parsed = JSON.parse(storedData);
                        if (typeof parsed === 'object' && parsed.content) {
                            content = parsed.content;
                            timestamp = parsed.time || '--:--';
                        } else {
                            // Migration for old string-only format
                            content = storedData;
                        }
                    } catch (e) {
                        content = storedData;
                    }
                } else {
                    // Pull from loaded Notion data if available
                    const fb = NOTION_FEEDBACKS.find(f => f.studentId === student.pageId && f.lessonId === targetLessonSelect.value);
                    if (fb) {
                        content = fb.text;
                        if (fb.date) {
                            const d = new Date(fb.date);
                            timestamp = d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
                        }
                    }
                }

                feedbackEditor.innerHTML = content;
                lastSavedTime.textContent = timestamp;
                checkEmpty();
                setSaved();
            }

            // Word Count
            const updateWordCount = () => {
                const text = feedbackEditor.innerText.trim();
                const words = text ? text.split(/\s+/).length : 0;
                wordCountDisplay.textContent = `${words} ${words === 1 ? 'word' : 'words'}`;
            };

            feedbackEditor.addEventListener('input', updateWordCount);

            // Formatting
            function updateFormatButtons() {
                boldBtn.classList.toggle('active', document.queryCommandState('bold'));
                italicBtn.classList.toggle('active', document.queryCommandState('italic'));
                underlineBtn.classList.toggle('active', document.queryCommandState('underline'));
            }

            feedbackEditor.addEventListener('keyup', updateFormatButtons);
            feedbackEditor.addEventListener('mouseup', updateFormatButtons);

            // Robust Placeholder Logic
            const checkEmpty = () => {
                const text = feedbackEditor.innerText.trim();
                if (!text || text === '\n') {
                    feedbackEditor.innerHTML = '';
                    feedbackEditor.setAttribute('data-is-empty', 'true');
                } else {
                    feedbackEditor.removeAttribute('data-is-empty');
                }
            };
            feedbackEditor.addEventListener('input', checkEmpty);
            feedbackEditor.addEventListener('blur', checkEmpty);

            boldBtn.addEventListener('click', () => { document.execCommand('bold'); updateFormatButtons(); });
            italicBtn.addEventListener('click', () => { document.execCommand('italic'); updateFormatButtons(); });
            underlineBtn.addEventListener('click', () => { document.execCommand('underline'); updateFormatButtons(); });

            // Save Logic (Local Simulation)
            function setNotSaved() {
                saveStatus.className = 'text-amber-500 flex items-center gap-1 font-bold';
                saveStatusIndicator.className = 'w-2 h-2 rounded-full bg-amber-500';
                saveStatusText.textContent = 'Not Saved';
            }

            function setSaved() {
                saveStatus.className = 'text-[#22c55e] flex items-center gap-1 font-bold';
                saveStatusIndicator.className = 'w-2 h-2 rounded-full bg-[#22c55e]';
                saveStatusText.textContent = 'Saved';
            }

            feedbackEditor.addEventListener('input', setNotSaved);

            saveNotesBtn.addEventListener('click', async () => {
                const activeItem = document.querySelector('.student-item.active');
                if (!activeItem || !targetLessonSelect.value) return;

                const studentId = activeItem.dataset.studentId;
                const lessonId = targetLessonSelect.value;
                const feedbackText = feedbackEditor.innerText.trim();

                if (!feedbackText) {
                    alert('Please write some feedback before saving.');
                    return;
                }

                const student = NOTION_STUDENTS.find(s => s.id === studentId);
                const currentUser = Auth.getCurrentUser();
                const teacher = NOTION_TEACHERS.find(t => t.id === currentUser?.id);
                const lesson = NOTION_LESSONS.find(l => l.pageId === lessonId);

                const originalBtnContent = saveNotesBtn.innerHTML;

                try {
                    saveNotesBtn.disabled = true;
                    saveNotesBtn.innerHTML = '<span class="animate-pulse">Saving to Notion...</span>';

                    const response = await fetch('/.netlify/functions/save-student-feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            feedbackText: feedbackText,
                            studentPageId: student?.pageId || studentId,
                            teacherPageId: teacher?.pageId || currentUser?.pageId,
                            lessonPageId: lesson?.pageId || lessonId
                        })
                    });

                    let resultData;
                    try {
                        resultData = await response.json();
                    } catch (e) {
                        throw new Error("Server communication error");
                    }

                    if (!response.ok) throw new Error(resultData.error || 'Failed to save feedback');

                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });

                    // Store locally with timestamp
                    localStorage.setItem(`feedback-${studentId}-${lessonId}`, JSON.stringify({
                        content: feedbackEditor.innerHTML,
                        time: timeStr
                    }));

                    setSaved();
                    saveStatusText.textContent = "Saved to Notion";

                    // Update last saved time
                    lastSavedTime.textContent = timeStr;

                    // Visual feedback
                    saveNotesBtn.innerHTML = '<span class="text-white">✓ Success!</span>';
                    saveNotesBtn.classList.replace('bg-[#2563eb]', 'bg-green-500');

                    setTimeout(() => {
                        saveNotesBtn.innerHTML = originalBtnContent;
                        saveNotesBtn.classList.replace('bg-green-500', 'bg-[#2563eb]');
                    }, 2000);

                    console.log(`✅ Feedback for ${student?.name} saved successfully.`);
                } catch (error) {
                    console.error('Save error:', error);
                    alert(error.message || 'Error saving to Notion. Your notes are still in the editor.');
                } finally {
                    saveNotesBtn.disabled = false;
                }
            });

            // Target Lesson selection change
            targetLessonSelect.addEventListener('change', () => {
                const activeItem = document.querySelector('.student-item.active');
                if (!activeItem) return;
                const studentId = activeItem.dataset.studentId;
                const lessonId = targetLessonSelect.value;

                const storedData = localStorage.getItem(`feedback-${studentId}-${lessonId}`);
                let content = '';
                let timestamp = '--:--';

                if (storedData) {
                    try {
                        const parsed = JSON.parse(storedData);
                        if (typeof parsed === 'object' && parsed.content) {
                            content = parsed.content;
                            timestamp = parsed.time || '--:--';
                        } else {
                            content = storedData;
                        }
                    } catch (e) {
                        content = storedData;
                    }
                } else {
                    // Pull from Notion data
                    const student = NOTION_STUDENTS.find(s => s.id === studentId);
                    const fb = NOTION_FEEDBACKS.find(f => f.studentId === student?.pageId && f.lessonId === lessonId);
                    if (fb) {
                        content = fb.text;
                        if (fb.date) {
                            const d = new Date(fb.date);
                            timestamp = d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
                        }
                    }
                }

                feedbackEditor.innerHTML = content;
                lastSavedTime.textContent = timestamp;
                checkEmpty();
                setSaved();
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!groupFilterBtn.contains(e.target) && !groupDropdown.contains(e.target)) {
                    groupDropdown.classList.add('hidden');
                }
            });

            // Init
            async function init() {
                studentsList.innerHTML = `
                    <div class="p-8 text-center animate-pulse">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Loading students...</p>
                    </div>
                `;
                await DataLoader.waitForData();
                initFilters();
                renderStudents();
            }

            init();
        });
    </script>
</body>

</html>
