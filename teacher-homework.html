<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Homeworks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/teacher-style.css">
    <script src="assets/js/data-loader.js"></script>
    <script src="assets/js/auth.js"></script>
    <style>
        .homework-status {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-submitted {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #ffedd5;
            color: #c2410c;
        }

        .status-graded {
            background: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>

<body>

    <div class="teacher-layout">
        <!-- Sidebar -->
        <aside class="teacher-sidebar">
            <div class="flex items-center gap-3 mb-10 px-2">
                <img src="assets/img/logo.png" alt="Oruj Logo" class="w-10 h-10 rounded-xl object-cover shadow-sm">
                <div>
                    <h1 class="font-extrabold text-[#0f172a] leading-tight tracking-tight">ORUJ'S ENGLISH</h1>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Teacher's Portal</p>
                </div>
            </div>

            <nav class="flex-grow space-y-2">
                <a href="teacher-notes.html" class="teacher-nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Student Notes
                </a>
                <a href="teacher-calendar.html" class="teacher-nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Calendar
                </a>
                <a href="teacher-homework.html" class="teacher-nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Homeworks
                </a>
                <a href="teacher-classes.html" class="teacher-nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    Classes
                </a>
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-100">
                <div class="flex items-center gap-3 px-2">
                    <img id="user-avatar"
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""
                        class="w-10 h-10 rounded-full object-cover bg-slate-100">
                    <div>
                        <div id="user-name" class="text-sm font-bold text-[#0f172a]">Loading...</div>
                        <div id="user-role" class="text-[10px] font-bold text-slate-400 uppercase"></div>
                    </div>
                    <button id="logout-btn" class="ml-auto text-slate-400 hover:text-red-500 transition-colors"
                        title="Logout">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="teacher-main">
            <!-- Header -->
            <header class="flex justify-between items-center mb-10">
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" placeholder="Search lessons, students, or groups..." class="search-input">
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex bg-white border border-slate-200 rounded-full p-1">
                        <button class="px-3 py-1 bg-[#2563eb] text-white rounded-full text-[11px] font-bold">EN</button>
                        <button
                            class="px-3 py-1 text-slate-400 hover:text-slate-600 rounded-full text-[11px] font-bold transition-colors">AZ</button>
                    </div>
                    <button
                        class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-400 hover:text-[#2563eb] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                    <button
                        class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-400 hover:text-[#2563eb] transition-colors relative">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span
                            class="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                    </button>
                    <button
                        class="w-10 h-10 bg-[#0f172a] text-white rounded-full flex items-center justify-center hover:bg-[#1e293b] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </button>
                </div>
            </header>

            <div class="flex justify-between items-end mb-2">
                <div>
                    <h1 class="text-3xl font-extrabold text-[#0f172a] mb-2 tracking-tight">Homework Management</h1>
                    <p class="text-[#64748b] font-medium">Track student submissions and assign new tasks for your
                        groups.</p>
                </div>
                <button onclick="localStorage.removeItem('notion_portal_cache'); location.reload();"
                    class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh Database
                </button>
            </div>

            <div class="grid grid-cols-[1.5fr_1fr] gap-8">
                <!-- Review Uploads -->
                <div>
                    <div class="flex flex-wrap gap-3 mb-6 bg-white border border-slate-200 rounded-xl p-3">
                        <div class="flex-1 min-w-[140px]">
                            <label
                                class="text-[9px] font-extrabold text-slate-400 uppercase mb-1 block px-1">Status</label>
                            <select id="filter-status"
                                class="w-full bg-slate-50 border border-slate-100 rounded-lg px-2 py-1.5 text-xs font-bold text-slate-600 focus:outline-none focus:border-blue-400">
                                <option value="all">All Statuses</option>
                                <option value="Not checked">Pending</option>
                                <option value="Checked">Checked</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[140px]">
                            <label
                                class="text-[9px] font-extrabold text-slate-400 uppercase mb-1 block px-1">Group</label>
                            <select id="filter-group"
                                class="w-full bg-slate-50 border border-slate-100 rounded-lg px-2 py-1.5 text-xs font-bold text-slate-600 focus:outline-none focus:border-blue-400">
                                <option value="all">All Groups</option>
                                <!-- Injected via JS -->
                            </select>
                        </div>
                        <div class="flex-1 min-w-[140px]">
                            <label
                                class="text-[9px] font-extrabold text-slate-400 uppercase mb-1 block px-1">Time</label>
                            <select id="filter-time"
                                class="w-full bg-slate-50 border border-slate-100 rounded-lg px-2 py-1.5 text-xs font-bold text-slate-600 focus:outline-none focus:border-blue-400">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                            </select>
                        </div>
                    </div>

                    <div id="submissions-list" class="space-y-4">
                        <!-- Empty state -->
                        <div class="text-center py-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                            <p class="text-slate-400 font-medium">No recent submissions to review.</p>
                        </div>
                    </div>
                </div>

                <!-- Assign New Task -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 h-fit shadow-sm">
                    <h2 class="text-lg font-extrabold flex items-center gap-2 mb-6 border-b border-slate-100 pb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#2563eb]" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Assign New Hometask
                    </h2>

                    <form id="assign-task-form" class="space-y-5">
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Select
                                Class</label>
                            <select id="class-select"
                                class="w-full bg-[#f8fafc] border border-slate-200 rounded-lg p-3 text-sm font-semibold text-[#0f172a] focus:outline-none focus:border-[#2563eb]">
                                <option value="">Select a group...</option>
                                <!-- Injected via JS -->
                            </select>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Select
                                Lesson</label>
                            <select id="lesson-select"
                                class="w-full bg-[#f8fafc] border border-slate-200 rounded-lg p-3 text-sm font-semibold text-[#0f172a] focus:outline-none focus:border-[#2563eb]">
                                <option value="">Select a lesson...</option>
                            </select>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Task
                                Title</label>
                            <input type="text" placeholder="e.g. Workbook Page 42"
                                class="w-full bg-[#f8fafc] border border-slate-200 rounded-lg p-3 text-sm font-semibold text-[#0f172a] focus:outline-none focus:border-[#2563eb] placeholder:font-normal">
                        </div>

                        <div class="space-y-1">
                            <label
                                class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Instructions</label>
                            <textarea rows="4" placeholder="Describe the task details here..."
                                class="w-full bg-[#f8fafc] border border-slate-200 rounded-lg p-3 text-sm font-semibold text-[#0f172a] focus:outline-none focus:border-[#2563eb] placeholder:font-normal resize-none"></textarea>
                        </div>




                        <button type="submit"
                            class="w-full bg-[#2563eb] text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                            Assign Task
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.checkAuth('teacher');
            if (!user) return;

            // Automatically re-initialize UI if fresh data loads
            document.addEventListener('portalDataReady', () => {
                initForm();
            });

            const classSelect = document.getElementById('class-select');
            const lessonSelect = document.getElementById('lesson-select');
            const form = document.getElementById('assign-task-form');
            const submissionsList = document.getElementById('submissions-list');

            const filterStatus = document.getElementById('filter-status');
            const filterGroup = document.getElementById('filter-group');
            const filterTime = document.getElementById('filter-time');


            function initForm() {
                try {
                    const groupsData = window.NOTION_GROUPS || [];
                    const filteredGroups = Auth.filterData(groupsData, 'groups');

                    console.log("Homework Init - User:", Auth.getCurrentUser());
                    console.log("Homework Init - All Groups:", groupsData);
                    console.log("Homework Init - Filtered Groups:", filteredGroups);

                    // Clear and populate both selects with groups
                    const defaultClassOption = '<option value="">Select a group...</option>';
                    const defaultFilterOption = '<option value="all">All Groups</option>';

                    // If filtered groups is empty but we have groups, maybe teacherId mismatch?
                    // Fallback to all groups if none match, but marked as warning
                    const groupsToUse = filteredGroups.length > 0 ? filteredGroups : groupsData;
                    if (filteredGroups.length === 0 && groupsData.length > 0) {
                        console.warn("No groups matched your teacher ID. Showing all groups as fallback.");
                    }

                    if (groupsToUse.length > 0) {
                        const optionsMarkup = groupsToUse.map(group =>
                            `<option value="${group.id}">${group.id} - ${group.name}</option>`
                        ).join('');

                        classSelect.innerHTML = defaultClassOption + optionsMarkup;
                        filterGroup.innerHTML = defaultFilterOption + optionsMarkup;
                    } else {
                        classSelect.innerHTML = defaultClassOption;
                        filterGroup.innerHTML = defaultFilterOption;
                    }

                    renderSubmissions();
                } catch (err) {
                    console.error("Error in initForm:", err);
                }
            }



            function renderSubmissions() {
                const subsData = window.NOTION_SUBMISSIONS || [];
                let filteredSubmissions = Auth.filterData(subsData, 'submissions');

                // 1. Status Filter
                if (filterStatus && filterStatus.value !== 'all') {
                    filteredSubmissions = filteredSubmissions.filter(sub => sub.status === filterStatus.value);
                }

                // 2. Group Filter
                if (filterGroup && filterGroup.value !== 'all') {
                    const selectedGroupId = filterGroup.value;
                    filteredSubmissions = filteredSubmissions.filter(sub => {
                        // Support both direct groupId string (legacy) and groupIds array
                        if (sub.groupId === selectedGroupId) return true;
                        if (sub.groupIds && Array.isArray(sub.groupIds)) {
                            return sub.groupIds.includes(selectedGroupId);
                        }
                        return false;
                    });
                }

                // 3. Time Filter (Sorting by ID or timestamp if available)
                if (filteredSubmissions && filteredSubmissions.length > 0) {
                    filteredSubmissions.sort((a, b) => {
                        const timeVal = filterTime ? filterTime.value : 'newest';
                        const order = timeVal === 'newest' ? -1 : 1;
                        const idA = a.id || '';
                        const idB = b.id || '';
                        return (idA > idB ? 1 : -1) * order;
                    });
                }

                if (typeof filteredSubmissions !== 'undefined' && filteredSubmissions.length > 0) {
                    submissionsList.innerHTML = filteredSubmissions.map(sub => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-[#2563eb] font-bold">
                                        ${(sub.studentName || 'U').charAt(0)}
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-slate-800 text-sm">${sub.name || 'Untitled'}</h4>
                                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">${sub.studentName || 'Student'}</p>
                                    </div>
                                </div>
                                <span class="px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${sub.status === 'Checked' ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}">
                                    ${sub.status || 'Pending'}
                                </span>
                            </div>
                            ${sub.submissionText ? `
                                <div class="mt-3 p-3 bg-slate-50 rounded-xl border border-slate-100 italic text-slate-600 text-[13px] leading-relaxed whitespace-pre-wrap">
                                    ${sub.submissionText}
                                </div>
                            ` : ''}
                            <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-50">
                                <div class="flex gap-2">
                                </div>
                                ${sub.status !== 'Checked' ? `
                                    <button onclick="markAsChecked(event, '${sub.id}', '${sub.name}')" class="px-3 py-1.5 bg-[#2563eb] text-white rounded-lg text-[10px] font-bold hover:bg-blue-700 transition-colors">
                                        Mark as Checked
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    submissionsList.innerHTML = `
                        <div class="text-center py-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                            <p class="text-slate-400 font-medium">No recent submissions found matching current filters.</p>
                        </div>
                    `;
                }
            }

            window.markAsChecked = async function (event, subId, subName) {
                const btn = event.currentTarget || event.target;
                const originalText = btn.innerHTML;

                try {
                    btn.disabled = true;
                    btn.innerHTML = '<span class="animate-pulse">Updating...</span>';

                    const response = await fetch('/.netlify/functions/update-submission-status', {
                        method: 'POST',
                        body: JSON.stringify({
                            submissionId: subId,
                            status: 'Checked'
                        })
                    });

                    let data;
                    try {
                        data = await response.json();
                    } catch (e) {
                        throw new Error(`Invalid server response: ${response.statusText}`);
                    }

                    if (!response.ok) throw new Error(data.error || 'Failed to update Notion');

                    // Locally update UI for immediate feedback
                    const sub = (window.NOTION_SUBMISSIONS || []).find(s => s.id === subId);
                    if (sub) {
                        sub.status = 'Checked';
                        renderSubmissions();
                    }

                    console.log(`✅ Submission "${subName}" marked as checked in Notion.`);
                } catch (error) {
                    console.error('Error marking as checked:', error);
                    alert(`Action failed: ${error.message}`);
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            };

            [filterStatus, filterGroup, filterTime].forEach(el => {
                el.addEventListener('change', renderSubmissions);
            });

            classSelect.addEventListener('change', () => {
                const selectedGroupId = classSelect.value;
                lessonSelect.innerHTML = '<option value="">Select a lesson...</option>';

                const lessonsData = window.NOTION_LESSONS || [];
                console.log(`Class changed to: ${selectedGroupId}, Total lessons: ${lessonsData.length}`);

                if (selectedGroupId && lessonsData.length > 0) {
                    const filteredLessons = Auth.filterData(lessonsData, 'lessons').filter(l => {
                        // Support string or array of groupIds
                        if (l.groupId === selectedGroupId) return true;
                        if (l.groupIds && Array.isArray(l.groupIds)) return l.groupIds.includes(selectedGroupId);
                        return false;
                    });

                    console.log(`Lessons for group ${selectedGroupId}:`, filteredLessons);

                    filteredLessons.forEach(lesson => {
                        const date = new Date(lesson.isoDate).toLocaleDateString();
                        const option = document.createElement('option');
                        option.value = lesson.pageId || lesson.id; // Use pageId for Notion relation
                        option.textContent = `${lesson.id} - ${lesson.title} (${date})`;
                        lessonSelect.appendChild(option);
                    });
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const data = {
                    lessonId: lessonSelect.value,
                    groupName: classSelect.options[classSelect.selectedIndex].text,
                    title: form.querySelector('input[type="text"]').value,
                    instructions: form.querySelector('textarea').value,
                    date: new Date().toISOString()
                };

                if (!data.lessonId || !data.title) {
                    alert('Please select a lesson and provide a title.');
                    return;
                }

                const btn = form.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="animate-pulse">Creating...</span>';

                try {
                    const finalInstructions = data.instructions;

                    const response = await fetch('/.netlify/functions/create-assignment', {
                        method: 'POST',
                        body: JSON.stringify({
                            title: data.title,
                            lessonId: data.lessonId,
                            instructions: finalInstructions
                        })
                    });

                    let respData;
                    try {
                        respData = await response.json();
                    } catch (e) {
                        throw new Error(`Invalid server response: ${response.statusText}`);
                    }

                    if (!response.ok) throw new Error(respData.error || 'Failed to create assignment');

                    alert(`✅ Success! Assignment "${data.title}" has been created in Notion.`);
                    form.reset();

                    lessonSelect.innerHTML = '<option value="">Select a lesson...</option>';
                    console.log(`✅ Assignment "${data.title}" created successfully.`);
                } catch (error) {
                    console.error('Create error:', error);
                    alert(`Error creating assignment: ${error.message}`);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });

            async function init() {
                try {
                    submissionsList.innerHTML = `
                        <div class="text-center py-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 animate-pulse">
                            <p class="text-slate-400 font-medium">Loading submissions...</p>
                        </div>
                    `;
                    await DataLoader.waitForData();
                    initForm();
                } catch (err) {
                    console.error("Init failed:", err);
                    submissionsList.innerHTML = `
                        <div class="text-center py-20 bg-red-50 rounded-2xl border-2 border-dashed border-red-200">
                            <p class="text-red-500 font-medium">Failed to load data. Please refresh.</p>
                        </div>
                    `;
                }
            }

            init();
        });
    </script>
</body>

</html>
